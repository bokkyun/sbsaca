<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bokkyun</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 2rem; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #667eea; font-weight: 600; margin-bottom: 16px; }
    p { color: #666; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">bokkyun입니다</p>
    <p>방문해 주셔서 감사합니다.<br>새로운 것을 만들고 배우는 것을 좋아합니다.</p>
    <a class="btn" href="https://github.com/bokkyun" target="_blank">GitHub 방문하기</a>
  </div>
</body>
</html>
